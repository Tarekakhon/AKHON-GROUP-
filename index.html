<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKHON SHOP</title>
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #f4f4f7; margin: 0; padding: 0; }
        .header { background-color: #f57224; color: white; text-align: center; padding: 20px; font-size: 24px; font-weight: bold; position: sticky; top: 0; z-index: 100; }
        .container { padding: 15px; }
        .section-title { font-size: 18px; font-weight: bold; margin: 20px 0 10px; color: #333; border-left: 4px solid #f57224; padding-left: 10px; display: flex; justify-content: space-between; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .product-card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        .product-image { width: 100%; height: 150px; object-fit: cover; }
        .product-info { padding: 10px; text-align: center; }
        .product-name { font-size: 13px; font-weight: 600; color: #444; height: 35px; overflow: hidden; margin-bottom: 5px; }
        .product-price { color: #f57224; font-size: 16px; font-weight: bold; margin-bottom: 10px; }
        .buy-btn { background-color: #f57224; color: white; border: none; width: 100%; padding: 10px 0; border-radius: 5px; font-weight: bold; text-decoration: none; display: block; font-size: 13px; }
    </style>
</head>
<body>

<div class="header">AKHON SHOP</div>

<div class="container">
    <div class="section-title">Cigarettes</div>
    <div class="product-grid">
        <div class="product-card">
            <img class="product-image" src="https://www.the-cigarette-store.com/media/catalog/product/cache/1/image/9df78eab33525d08d6e5fb8d27136e95/m/a/marlboro_gold_original.jpg" alt="Marlboro">
            <div class="product-info">
                <p class="product-name">Marlboro Gold/Red</p>
                <p class="product-price">220 AED</p>
                <a href="https://wa.me/9710503974296?text=Marlboro" class="buy-btn">Buy Now</a>
            </div>
        </div>
        <div class="product-card">
            <img class="product-image" src="https://www.the-cigarette-store.com/media/catalog/product/cache/1/image/9df78eab33525d08d6e5fb8d27136e95/d/u/dunhill_international_red.jpg" alt="Dunhill">
            <div class="product-info">
                <p class="product-name">Dunhill/Parliament</p>
                <p class="product-price">240 AED</p>
                <a href="https://wa.me/9710503974296?text=Dunhill" class="buy-btn">Buy Now</a>
            </div>
        </div>
    </div>

    <div class="section-title">Pakistani Threepiece <span>60 AED</span></div>
    <div class="product-grid" id="pakistani">
        <script>
            for(let i=1; i<=5; i++){
                document.write(`
                <div class="product-card">
                    <img class="product-image" src="https://images.unsplash.com/photo-1583391733956-3750e0ff4e8b?q=80&w=400&index=${i}" alt="Pakistani ${i}">
                    <div class="product-info">
                        <p class="product-name">Pakistani Design ${i}</p>
                        <p class="product-price">60 AED</p>
                        <a href="https://wa.me/9710503974296?text=Pakistani Threepiece Design ${i}" class="buy-btn">Buy Now</a>
                    </div>
                </div>`);
            }
        </script>
    </div>

    <div class="section-title">Indian Threepiece <span>380 AED</span></div>
    <div class="product-grid" id="indian">
        <script>
            for(let i=1; i<=8; i++){
                document.write(`
                <div class="product-card">
                    <img class="product-image" src="https://images.unsplash.com/photo-1610030469983-98e550d6193c?q=80&w=400&index=${i}" alt="Indian ${i}">
                    <div class="product-info">
                        <p class="product-name">Indian Design ${i}</p>
                        <p class="product-price">380 AED</p>
                        <a href="https://wa.me/9710503974296?text=Indian Threepiece Design ${i}" class="buy-btn">Buy Now</a>
                    </div>
                </div>`);
            }
        </script>
    </div>
</div>

</body>
</html>
