<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKHON SHOP | WhatsApp & Imo</title>
    <style>
        :root { --main: #f57224; --bg: #f4f4f4; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 20px; }
        .nav { background: var(--main); color: white; padding: 15px; position: sticky; top: 0; z-index: 1000; text-align: center; }
        .tabs { display: flex; overflow-x: auto; background: white; padding: 10px; gap: 8px; border-bottom: 1px solid #ddd; }
        .tab { padding: 8px 18px; background: #f0f0f0; border-radius: 20px; white-space: nowrap; cursor: pointer; font-size: 13px; font-weight: 600; }
        .tab.active { background: var(--main); color: white; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 10px; max-width: 900px; margin: auto; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 3px 10px rgba(0,0,0,0.08); }
        .img-box { width: 100%; height: 180px; background: #ddd; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .info { padding: 12px; }
        .price { color: var(--main); font-size: 17px; font-weight: bold; }
        .buy-btn { background: var(--main); color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* New Order Modal */
        #orderModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; }
        .form-box { background: white; padding: 20px; width: 85%; max-width: 400px; border-radius: 15px; text-align: center; }
        .order-choice { display: flex; gap: 10px; margin-top: 20px; }
        .btn-wa { background: #25D366; color: white; flex: 1; padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-imo { background: #1a73e8; color: white; flex: 1; padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="nav"><div style="font-size: 24px; font-weight: bold;">AKHON SHOP 🛍️</div></div>

<div class="tabs">
    <div class="tab active" onclick="setCat('All', this)">All</div>
    <div class="tab" onclick="setCat('Dresses', this)">Dresses 👗</div>
    <div class="tab" onclick="setCat('Gadgets', this)">Gadgets 📱</div>
    <div class="tab" onclick="setCat('Shoes', this)">Shoes 👟</div>
</div>

<div class="grid" id="list"></div>

<div id="orderModal">
    <div class="form-box">
        <h3 id="selectedItem">অর্ডার করার মাধ্যম বেছে নিন</h3>
        <p style="font-size: 14px; color: #666;">আপনি কিভাবে যোগাযোগ করতে চান?</p>
        <div class="order-choice">
            <button class="btn-wa" onclick="orderWhatsApp()">WhatsApp</button>
            <button class="btn-imo" onclick="orderImo()">Imo</button>
        </div>
        <button style="width:100%; margin-top:15px; padding:10px; border:none; background:#eee; border-radius:8px;" onclick="closeModal()">বাতিল</button>
    </div>
</div>

<script>
    const myNumber = "971503974296"; // আপনার হোয়াটসঅ্যাপ এবং ইমো নম্বর
    let currentProd = "", currentPrice = "";

    const products = [];
    const cats = ['Dresses', 'Gadgets', 'Shoes'];
    
    // ২০০টি ইউনিক আইটেম জেনারেট করা
    for (let i = 1; i <= 200; i++) {
        let cat = cats[i % cats.length];
        products.push({
            cat: cat,
            name: `${cat} Premium Item #${100 + i}`,
            price: 150 + (i % 50),
            img: `https://loremflickr.com/400/400/${cat.toLowerCase()}?lock=${i}`
        });
    }

    function render(list) {
        const grid = document.getElementById('list');
        grid.innerHTML = list.map(p => `
            <div class="card">
                <div class="img-box"><img src="${p.img}"></div>
                <div class="info">
                    <div style="font-weight:600; font-size:13px;">${p.name}</div>
                    <div class="price">${p.price} AED</div>
                    <button class="buy-btn" onclick="openModal('${p.name}', '${p.price}')">অর্ডার দিন</button>
                </div>
            </div>
        `).join('');
    }

    function openModal(n, p) {
        currentProd = n; currentPrice = p;
        document.getElementById('selectedItem').innerText = n;
        document.getElementById('orderModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('orderModal').style.display = 'none'; }

    function orderWhatsApp() {
        const msg = `আসসালামু আলাইকুম, আমি এই পণ্যটি অর্ডার করতে চাই:\nনাম: ${currentProd}\nদাম: ${currentPrice} AED`;
        window.open(`https://wa.me/${myNumber}?text=${encodeURIComponent(msg)}`);
        closeModal();
    }

    function orderImo() {
        alert("আপনার ইমোতে মেসেজ দিতে নম্বরটি সেভ করুন: " + myNumber);
        // ইমো অ্যাপ খোলার চেষ্টা করবে (সব ডিভাইসে কাজ নাও করতে পারে)
        window.location.href = "imo://chat?number=" + myNumber;
        closeModal();
    }

    function setCat(c, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        const filtered = c === "All" ? products : products.filter(p => p.cat === c);
        render(filtered);
    }

    render(products);
</script>

</body>
</html>
