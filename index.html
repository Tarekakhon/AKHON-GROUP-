<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #f4f4f4; margin: 0; padding: 10px; }
        .header { background-color: #f57224; color: white; text-align: center; padding: 15px; border-radius: 0 0 15px 15px; margin-bottom: 20px; }
        .section-title { font-size: 18px; font-weight: bold; margin: 15px 0 10px; color: #333; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .product-card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .product-image { background-color: #e0e0e0; height: 120px; display: flex; align-items: center; justify-content: center; color: #999; font-size: 12px; }
        .product-info { padding: 8px; flex-grow: 1; }
        .product-name { font-size: 14px; font-weight: bold; margin: 0; height: 35px; overflow: hidden; }
        .product-price { color: #f57224; font-size: 16px; font-weight: bold; margin: 5px 0; }
        .buy-btn { background-color: #f57224; color: white; border: none; width: 100%; padding: 8px; border-radius: 4px; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; text-align: center; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0;">AKHON SHOP</h2>
</div>

<div class="section-title">Cigarettes</div>
<div class="product-grid">
    <div class="product-card">
        <div class="product-image">ছবি এখানে দিন</div>
        <div class="product-info">
            <p class="product-name">Marlboro Gold / Red</p>
            <p class="product-price">220 AED</p>
            <a href="https://wa.me/9710503974296?text=I want Marlboro" class="buy-btn">Buy Now</a>
        </div>
    </div>
    <div class="product-card">
        <div class="product-image">ছবি এখানে দিন</div>
        <div class="product-info">
            <p class="product-name">Dunhill / Parliament</p>
            <p class="product-price">240 AED</p>
            <a href="https://wa.me/9710503974296?text=I want Dunhill" class="buy-btn">Buy Now</a>
        </div>
    </div>
</div>

<div class="section-title">Fashion - Three Piece</div>
<div class="product-grid">
    <div class="product-card">
        <div class="product-image">ছবি এখানে দিন</div>
        <div class="product-info">
            <p class="product-name">Pakistani Three-piece</p>
            <p class="product-price">400 AED</p>
            <a href="https://wa.me/9710503974296?text=I want Pakistani Three-piece" class="buy-btn">Buy Now</a>
        </div>
    </div>
    <div class="product-card">
        <div class="product-image">ছবি এখানে দিন</div>
        <div class="product-info">
            <p class="product-name">Indian Three-piece</p>
            <p class="product-price">380 AED</p>
            <a href="https://wa.me/9710503974296?text=I want Indian Three-piece" class="buy-btn">Buy Now</a>
        </div>
    </div>
</div>

</body>
</html>
