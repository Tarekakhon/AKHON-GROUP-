<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKHON SHOP | Mega Store</title>
    <style>
        :root { --temu-orange: #f57224; --bg: #f4f4f4; }
        body { font-family: Arial, sans-serif; background-color: var(--bg); margin: 0; padding: 0; }
        .header { background: var(--temu-orange); color: white; padding: 15px; position: sticky; top: 0; z-index: 1000; text-align: center; }
        .search-area { background: white; border-radius: 20px; padding: 10px; margin: 10px; display: flex; align-items: center; }
        .search-area input { border: none; outline: none; width: 100%; padding-left: 10px; }
        .container { padding: 10px; }
        .cat-title { font-size: 18px; font-weight: bold; margin: 20px 0 10px; border-left: 5px solid var(--temu-orange); padding-left: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; flex-direction: column; position: relative; }
        .badge { position: absolute; top: 5px; left: 5px; background: red; color: white; font-size: 10px; padding: 3px; border-radius: 3px; font-weight: bold; }
        .img-box { width: 100%; height: 170px; background: #eee; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .info { padding: 10px; flex-grow: 1; }
        .name { font-size: 13px; font-weight: bold; color: #333; height: 32px; overflow: hidden; margin-bottom: 5px; }
        .price { color: var(--temu-orange); font-size: 16px; font-weight: bold; }
        .old-price { color: #999; text-decoration: line-through; font-size: 11px; margin-left: 5px; }
        .btn { background: var(--temu-orange); color: white; border: none; width: 100%; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-size: 20px; font-weight: bold;">AKHON SHOP 🛒</div>
    <div class="search-area">🔍 <input type="text" id="find" onkeyup="search()" placeholder="Search 60+ items..."></div>
</div>

<div class="container" id="mall"></div>

<script>
    const wa = "971503974296";
    const storeData = [
        { cat: "Pakistani & Indian Dresses", items: [
            {n: "Lawn 3-Piece", p: 155, o: 250, i: "https://images.unsplash.com/photo-1583391733956-3750e0ff4e8b?w=300"},
            {n: "Maria B Silk", p: 210, o: 380, i: "https://images.unsplash.com/photo-1610030469983-98e550d6193c?w=300"},
            {n: "Indian Party Dress", p: 180, o: 300, i: "https://images.unsplash.com/photo-1621285853634-713b736b997c?w=300"},
            {n: "Chiffon Special", p: 240, o: 450, i: "https://images.unsplash.com/photo-1610030469668-935102528d61?w=300"},
            {n: "Designer Kurti", p: 85, o: 150, i: "https://images.unsplash.com/photo-1621285853106-96b6b3e6b72d?w=300"},
            {n: "Cotton Panjabi", p: 120, o: 220, i: "https://images.unsplash.com/photo-1594235211582-9c17cc399e46?w=300"}
        ]},
        { cat: "Electronics & Gadgets", items: [
            {n: "Series 8 Smartwatch", p: 120, o: 250, i: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=300"},
            {n: "Wireless Earbuds Pro", p: 85, o: 180, i: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=300"},
            {n: "Bluetooth Speaker", p: 45, o: 99, i: "https://images.unsplash.com/photo-1545454675-3531b543be5d?w=300"},
            {n: "Gaming Headphones", p: 150, o: 280, i: "https://images.unsplash.com/photo-1583394838336-acd977736f90?w=300"},
            {n: "Smart LED Lamp", p: 65, o: 120, i: "https://images.unsplash.com/photo-1507646227570-518a93590f13?w=300"},
            {n: "Power Bank 20k", p: 95, o: 180, i: "https://images.unsplash.com/photo-1609091839311-d5368195ad71?w=300"}
        ]},
        { cat: "Home Decor & Kitchen", items: [
            {n: "Luxury Bed Sheet", p: 140, o: 280, i: "https://images.unsplash.com/photo-1522771739844-6a9f6d5f14af?w=300"},
            {n: "Ceramic Flower Vase", p: 55, o: 110, i: "https://images.unsplash.com/photo-1581783898377-1c85bf937427?w=300"},
            {n: "Kitchen Knife Set", p: 75, o: 140, i: "https://images.unsplash.com/photo-1593618998160-e34014e67546?w=300"},
            {n: "Wall Clock Modern", p: 40, o: 85, i: "https://images.unsplash.com/photo-1508759073847-9ca702cec7d2?w=300"},
            {n: "Coffee Maker", p: 299, o: 550, i: "https://images.unsplash.com/photo-1520970014086-2208d157c9e2?w=300"},
            {n: "Indoor Green Plant", p: 30, o: 60, i: "https://images.unsplash.com/photo-1485955900006-10f4d324d411?w=300"}
        ]},
        { cat: "Shoes & Bags", items: [
            {n: "Nike Air Runner", p: 130, o: 260, i: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=300"},
            {n: "Luxury Handbag", p: 160, o: 320, i: "https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=300"},
            {n: "Travel Backpack", p: 95, o: 190, i: "https://images.unsplash.com/photo-1553062407-98eeb94c6a62?w=300"},
            {n: "Casual Sneaker", p: 70, o: 140, i: "https://images.unsplash.com/photo-1560769629-975ec94e6a86?w=300"}
        ]}
    ];

    function load() {
        const mall = document.getElementById('mall');
        storeData.forEach(c => {
            let s = `<div class="cat-title">${c.cat}</div><div class="grid">`;
            c.items.forEach(item => {
                s += `
                <div class="card">
                    <div class="badge">Sale</div>
                    <div class="img-box"><img src="${item.i}" onerror="this.src='https://via.placeholder.com/200?text=Product'"></div>
                    <div class="info">
                        <div class="name">${item.n}</div>
                        <div class="price">${item.p} AED <span class="old-price">${item.o} AED</span></div>
                        <button class="btn" onclick="location.href='https://wa.me/${wa}?text=Order: ${item.n}'">Buy Now</button>
                    </div>
                </div>`;
            });
            s += `</div>`;
            mall.innerHTML += s;
        });
    }

    function search() {
        let v = document.getElementById('find').value.toLowerCase();
        let cards = document.getElementsByClassName('card');
        for (let c of cards) {
            let n = c.querySelector('.name').innerText.toLowerCase();
            c.style.display = n.includes(v) ? "flex" : "none";
        }
    }
    load();
</script>

</body>
</html>
