<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKHON SHOP | Premium Store</title>
    <style>
        :root { --main: #f57224; --bg: #f4f4f4; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }
        .nav { background: var(--main); color: white; padding: 15px; position: sticky; top: 0; z-index: 1000; text-align: center; }
        .search-bar { background: white; border-radius: 25px; padding: 8px 15px; margin: 10px auto; width: 88%; display: flex; align-items: center; }
        .search-bar input { border: none; outline: none; width: 100%; font-size: 14px; margin-left: 8px; }
        .tabs { display: flex; overflow-x: auto; background: white; padding: 10px; gap: 8px; border-bottom: 1px solid #ddd; }
        .tab { padding: 8px 18px; background: #f0f0f0; border-radius: 20px; white-space: nowrap; cursor: pointer; font-size: 13px; font-weight: 600; }
        .tab.active { background: var(--main); color: white; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 10px; max-width: 900px; margin: auto; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 3px 10px rgba(0,0,0,0.08); display: flex; flex-direction: column; }
        .img-box { width: 100%; height: 180px; background: #eee; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .info { padding: 12px; }
        .p-name { font-size: 13px; font-weight: 600; color: #333; margin-bottom: 5px; height: 32px; overflow: hidden; }
        .price { color: var(--main); font-size: 17px; font-weight: bold; }
        .buy-btn { background: var(--main); color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        #orderModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; }
        .form-box { background: white; padding: 25px; width: 85%; max-width: 350px; border-radius: 15px; text-align: center; }
        .choice-btn { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .btn-wa { background: #25D366; color: white; padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-imo { background: #1a73e8; color: white; padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="nav">
    <div style="font-size: 22px; font-weight: bold;">AKHON SHOP 🛍️</div>
    <div class="search-bar">🔍 <input type="text" id="find" onkeyup="filter()" placeholder="আইটেম সার্চ করুন..."></div>
</div>

<div class="tabs">
    <div class="tab active" onclick="setCat('All', this)">All</div>
    <div class="tab" onclick="setCat('Dresses', this)">Dresses 👗</div>
    <div class="tab" onclick="setCat('Gadgets', this)">Gadgets 📱</div>
    <div class="tab" onclick="setCat('Shoes', this)">Shoes 👟</div>
    <div class="tab" onclick="setCat('Watches', this)">Watches ⌚</div>
</div>

<div class="grid" id="list"></div>

<div id="orderModal">
    <div class="form-box">
        <h3 id="selectedItem">অর্ডার কনফার্ম</h3>
        <p style="font-size: 14px; color: #666;">কিভাবে যোগাযোগ করতে চান?</p>
        <div class="choice-btn">
            <button class="btn-wa" onclick="orderWA()">হোয়াটসঅ্যাপে অর্ডার দিন</button>
            <button class="btn-imo" onclick="orderImo()">ইমোতে অর্ডার দিন</button>
        </div>
        <button style="width:100%; margin-top:15px; padding:10px; border:none; background:#eee; border-radius:8px;" onclick="closeModal()">বাতিল</button>
    </div>
</div>

<script>
    const myNum = "971503974296";
    let currentProd = "", currentPrice = "";

    // একদম ফিক্সড এবং ইউনিক ছবি
    const products = [
        { cat: "Dresses", name: "Luxury Silk Saree", price: 155, img: "https://images.pexels.com/photos/11038993/pexels-photo-11038993.jpeg?auto=compress&cs=tinysrgb&w=400" },
        { cat: "Dresses", name: "Modern Party Gown", price: 210, img: "https://images.pexels.com/photos/985635/pexels-photo-985635.jpeg?auto=compress&cs=tinysrgb&w=400" },
        { cat: "Gadgets", name: "Smart Watch S8 Ultra", price: 320, img: "https://images.pexels.com/photos/437037/pexels-photo-437037.jpeg?auto=compress&cs=tinysrgb&w=400" },
        { cat: "Gadgets", name: "Wireless Earbuds Pro", price: 130, img: "https://images.pexels.com/photos/3780681/pexels-photo-3780681.jpeg?auto=compress&cs=tinysrgb&w=400" },
        { cat: "Shoes", name: "Premium Leather Shoes", price: 225, img: "https://images.pexels.com/photos/298863/pexels-photo-298863.jpeg?auto=compress&cs=tinysrgb&w=400" },
        { cat: "Shoes", name: "Casual Sports Sneakers", price: 180, img: "https://images.pexels.com/photos/1598505/pexels-photo-1598505.jpeg?auto=compress&cs=tinysrgb&w=400" },
        { cat: "Watches", name: "Luxury Silver Watch", price: 450, img: "https://images.pexels.com/photos/277390/pexels-photo-277390.jpeg?auto=compress&cs=tinysrgb&w=400" },
        { cat: "Watches", name: "Classic Gold Edition", price: 480, img: "https://images.pexels.com/photos/190819/pexels-photo-190819.jpeg?auto=compress&cs=tinysrgb&w=400" }
    ];

    // একই ছবি যেন বারবার না আসে সেজন্য আইটেমগুলো বাড়ানো হলো
    const fullList = [];
    for(let i=0; i<30; i++) {
        products.forEach(p => {
            fullList.push({...p, name: p.name + " " + (i + 1)});
        });
    }

    function render(data) {
        document.getElementById('list').innerHTML = data.map(p => `
            <div class="card">
                <div class="img-box"><img src="${p.img}"></div>
                <div class="info">
                    <div class="p-name">${p.name}</div>
                    <div class="price">${p.price} AED</div>
                    <button class="buy-btn" onclick="openModal('${p.name}', '${p.price}')">অর্ডার দিন</button>
                </div>
            </div>
        `).join('');
    }

    function openModal(n, p) {
        currentProd = n; currentPrice = p;
        document.getElementById('selectedItem').innerText = n;
        document.getElementById('orderModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('orderModal').style.display = 'none'; }

    function orderWA() {
        window.open(`https://wa.me/${myNum}?text=Order for: ${currentProd} (${currentPrice} AED)`);
    }

    function orderImo() {
        alert("ইমোতে অর্ডার দিতে নম্বরটি সেভ করুন: " + myNum);
        window.location.href = "imo://chat?number=" + myNum;
    }

    function setCat(c, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        render(c === "All" ? fullList : fullList.filter(p => p.cat === c));
    }

    function filter() {
        let val = document.getElementById('find').value.toLowerCase();
        render(fullList.filter(p => p.name.toLowerCase().includes(val)));
    }

    render(fullList);
</script>

</body>
</html>
